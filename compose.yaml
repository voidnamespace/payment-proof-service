name: payment-proof

services:
  candidate-service:
    build: .
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Database: Data Source=/data/payment-proof.db;Default Timeout=30
      PROVIDER_URL: http://provider-simulator:8081
    ports:
      - "8080:8080"
    volumes:
      - candidate-data:/data

  provider-simulator:
    image: ghcr.io/fintech-dev-lab/internship-provider-simulator:v0.2.0
    environment:
      CALLBACK_URL: http://candidate-service:8080/receipts
    ports:
      - "8081:8081"
    depends_on:
      - candidate-service

volumes:
  candidate-data:
